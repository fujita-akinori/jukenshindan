<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学 参考書診断 | 受験診断ドットコム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* ==========================================================
     受験診断ドットコム — 数学診断 デザイントークン拡張
     ルートカラー = レベルカラーを再利用（意味の一貫性）
       定期テスト = lv1（緑） / 共通テスト = lv2（青） / 二次試験 = lv3（オレンジ）
     ========================================================== */
  :root{
    --lv5:#7d5ba6; /* 超級 */
    --paper-shadow: 0 28px 70px -24px rgba(0,0,0,0.6), 0 2px 0 rgba(255,255,255,0.4) inset;
  }

  @media (prefers-reduced-motion: no-preference){
    .card, .result-head, .shelf-wrap, .book-list{ animation: riseIn .38s cubic-bezier(.2,.8,.2,1) both; }
    .book-item{ animation: riseIn .3s cubic-bezier(.2,.8,.2,1) both; }
    .book-item:nth-child(1){ animation-delay:.02s; } .book-item:nth-child(2){ animation-delay:.06s; }
    .book-item:nth-child(3){ animation-delay:.10s; } .book-item:nth-child(4){ animation-delay:.14s; }
    .book-item:nth-child(5){ animation-delay:.18s; } .book-item:nth-child(6){ animation-delay:.22s; }
  }
  @keyframes riseIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }

  .page-wrap{ padding-top:44px; padding-bottom:130px; }
  h1.page-title{
    font-family:'Shippori Mincho', serif; font-weight:800;
    font-size:clamp(26px, 4.8vw, 38px); margin:0 0 6px; line-height:1.4; letter-spacing:0.01em;
  }
  .page-title-rule{
    width:56px; height:3px; background:var(--amber); border:none; margin:14px 0 18px; border-radius:2px;
  }
  .page-lead{ color:var(--text-on-ink-muted); font-size:14.5px; margin:0 0 30px; max-width:56ch; }

  /* -------------------- 経路表示（分岐ツリーを辿る足あと） -------------------- */
  .crumbs{ display:flex; flex-wrap:wrap; align-items:center; gap:0; margin-bottom:26px; row-gap:10px; }
  .crumb{
    font-size:11.5px; font-weight:700; padding:6px 13px 6px 12px; border-radius:8px;
    background:var(--ink-soft); color:var(--text-on-ink-muted);
    border:1px solid rgba(255,255,255,0.08);
    display:inline-flex; align-items:center; gap:6px;
    position:relative;
  }
  .crumb .k{ font-weight:500; opacity:.7; font-size:10.5px; }
  .crumb b{ color:var(--amber); font-weight:700; }
  .crumb + .crumb{ margin-left:6px; }
  .crumb-arrow{ color:var(--text-on-ink-muted); opacity:.4; font-size:12px; margin:0 2px; }

  /* -------------------- 質問カード -------------------- */
  .q-index{
    font-family:'Shippori Mincho', serif; font-size:12.5px; font-weight:700;
    color:var(--amber-deep); letter-spacing:0.14em; margin-bottom:12px;
    text-transform:uppercase;
  }
  .q-text{
    font-family:'Shippori Mincho', serif; font-size:clamp(19px, 3.4vw, 25px);
    font-weight:800; margin:0 0 26px; line-height:1.55; color:var(--text-on-paper);
  }
  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .choices.cols-1{ grid-template-columns:1fr; }
  .choices.cols-3{ grid-template-columns:1fr 1fr 1fr; }
  .choices.tags-grid{ grid-template-columns:repeat(3, 1fr); gap:10px; }

  .choice-btn{
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:700; font-size:15px;
    padding:16px 17px; border-radius:10px; border:2px solid rgba(27,33,48,0.10);
    background:#fff; color:var(--text-on-paper); cursor:pointer; text-align:left;
    transition:transform .14s cubic-bezier(.2,.8,.2,1), border-color .14s ease, background .14s ease, box-shadow .14s ease;
    position:relative;
  }
  .choice-btn:hover{
    border-color:var(--amber); background:#fffaf0; transform:translateY(-3px);
    box-shadow:0 10px 22px -12px rgba(196,127,31,0.5);
  }
  .choice-btn:active{ transform:translateY(-1px); }
  .choice-btn:focus-visible{ outline:2px solid var(--amber-deep); outline-offset:2px; }
  .choice-btn .sub{ display:block; font-weight:400; font-size:11.5px; color:#6b6250; margin-top:4px; }

  /* タグ風の分野選択（12分野）はコンパクトに */
  .tags-grid .choice-btn{
    text-align:center; padding:13px 10px; font-size:13.5px; border-radius:999px;
  }

  /* -------------------- スタート画面：3ルートを「見出しタブ」として -------------------- */
  .choice-btn[data-value="teiki"],
  .choice-btn[data-value="kyoutsuu"],
  .choice-btn[data-value="niji"]{
    padding:22px 22px 20px 24px; border-left-width:5px; border-radius:12px;
  }
  .choice-btn[data-value="teiki"]{ border-left-color:var(--lv1); }
  .choice-btn[data-value="kyoutsuu"]{ border-left-color:var(--lv2); }
  .choice-btn[data-value="niji"]{ border-left-color:var(--lv3); }
  .choice-btn[data-value="teiki"]:hover{ box-shadow:0 12px 26px -14px var(--lv1); border-color:var(--lv1); }
  .choice-btn[data-value="kyoutsuu"]:hover{ box-shadow:0 12px 26px -14px var(--lv2); border-color:var(--lv2); }
  .choice-btn[data-value="niji"]:hover{ box-shadow:0 12px 26px -14px var(--lv3); border-color:var(--lv3); }
  .choice-btn[data-value="teiki"] .sub,
  .choice-btn[data-value="kyoutsuu"] .sub,
  .choice-btn[data-value="niji"] .sub{ font-size:12.5px; margin-top:6px; }

  .nav-row{ display:flex; gap:16px; margin-top:20px; align-items:center; }
  .back-link{
    font-size:13px; color:var(--text-on-ink-muted); text-decoration:none; cursor:pointer;
    display:inline-flex; align-items:center; gap:5px;
  }
  .back-link:hover{ color:var(--amber); }

  /* -------------------- 結果画面 -------------------- */
  .result-head{ text-align:center; margin-bottom:32px; }
  .route-badge{
    display:inline-block; font-family:'Shippori Mincho', serif; font-weight:800;
    font-size:13px; letter-spacing:0.12em; padding:7px 18px; border-radius:999px;
    color:#fff; margin-bottom:16px; box-shadow:0 8px 18px -8px rgba(0,0,0,0.5);
  }
  .result-head h2{ font-family:'Shippori Mincho', serif; font-size:clamp(21px,4vw,27px); margin:0 0 10px; font-weight:800; }
  .result-head p{ color:var(--text-on-ink-muted); font-size:13.5px; max-width:52ch; margin:0 auto; }

  /* -------------------- 本棚（サイン要素）-------------------- */
  .shelf-wrap{ margin:26px 0 22px; }
  .shelf-label{
    font-size:11.5px; letter-spacing:0.1em; color:var(--text-on-ink-muted); margin-bottom:12px;
    font-weight:700; text-transform:uppercase;
  }
  .shelf{
    display:flex; align-items:flex-end; gap:7px;
    background:
      linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.3) 92%);
    padding:26px 18px 0;
    border-bottom:12px solid #3a2a1a;
    box-shadow: 0 8px 0 -2px #2a1d11, inset 0 -2px 4px rgba(0,0,0,0.3);
    border-radius:4px 4px 0 0; overflow-x:auto;
  }
  .spine{
    flex:0 0 auto; width:56px; height:182px; border-radius:3px 3px 1px 1px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding-top:16px;
    box-shadow:
      inset 3px 0 0 rgba(255,255,255,0.15),
      inset -7px 0 12px rgba(0,0,0,0.22),
      0 6px 14px rgba(0,0,0,0.35);
    position:relative; transition:transform .18s cubic-bezier(.2,.8,.2,1);
  }
  .spine:hover{ transform:translateY(-10px) rotate(-0.5deg); }
  .spine span{
    writing-mode:vertical-rl; text-orientation:mixed; font-family:'Shippori Mincho', serif;
    font-weight:700; font-size:12px; color:#fff; letter-spacing:0.05em; max-height:118px;
  }
  .spine.tall{ height:200px; } .spine.short{ height:162px; }
  /* 帯（おび）— 日本の参考書によくある色帯を背表紙下部に */
  .spine::after{
    content:''; position:absolute; left:0; right:0; bottom:14px; height:22px;
    background:rgba(0,0,0,0.22);
    border-top:1px solid rgba(255,255,255,0.25);
    border-bottom:1px solid rgba(0,0,0,0.3);
  }
  .spine .rank{
    position:relative; z-index:1; margin-top:auto; margin-bottom:18px;
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:900; font-size:11px; color:#fff;
    writing-mode:horizontal-tb; opacity:.85;
  }

  .book-list{ margin-top:26px; display:flex; flex-direction:column; gap:12px; }

  /* -------------------- 表彰台（ベスト3ランキング） -------------------- */
  .podium{
    display:flex; align-items:flex-end; justify-content:center; gap:14px;
    margin:30px 0 8px; padding:0 10px;
  }
  .podium-col{ display:flex; flex-direction:column; align-items:center; width:96px; }
  .podium-book{
    width:100%; border-radius:10px 10px 0 0;
    display:flex; align-items:flex-start; justify-content:center; padding-top:12px;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.35), 0 6px 14px rgba(0,0,0,0.3);
  }
  .podium-rank{ font-family:'Shippori Mincho', serif; font-weight:900; font-size:22px; color:var(--ink); }
  .podium-base{ width:100%; border-radius:0 0 6px 6px; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15); }
  .podium-1 .podium-book{ height:76px; } .podium-1 .podium-base{ height:56px; }
  .podium-2 .podium-book{ height:58px; } .podium-2 .podium-base{ height:40px; }
  .podium-3 .podium-book{ height:46px; } .podium-3 .podium-base{ height:30px; }
  .podium-1{ z-index:2; }
  .podium-2, .podium-3{ margin-bottom:2px; }

  .book-item.rank-1{
    border-color:rgba(232,163,61,0.4); background:linear-gradient(135deg, rgba(232,163,61,0.10), var(--ink-soft) 60%);
  }
  .book-item{
    background:var(--ink-soft); border-radius:10px; padding:15px 17px;
    display:flex; gap:13px; align-items:flex-start; border:1px solid rgba(255,255,255,0.06);
    transition:border-color .15s ease;
  }
  .book-item:hover{ border-color:rgba(232,163,61,0.3); }
  .book-chip{
    flex:0 0 auto; min-width:30px; height:30px; padding:0 8px; border-radius:8px; display:flex;
    align-items:center; justify-content:center; font-family:'Shippori Mincho', serif;
    font-weight:800; font-size:12px; color:#fff; white-space:nowrap;
  }
  .book-info{ flex:1; }
  .book-info .name{ font-weight:700; font-size:14.5px; margin:0 0 4px; line-height:1.5; }
  .book-info .name .scope-tag{
    display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px;
    margin-left:6px; background:rgba(255,255,255,0.1); color:var(--text-on-ink-muted); vertical-align:middle;
  }
  .book-info .desc{ font-size:12.5px; color:var(--text-on-ink-muted); margin:0 0 9px; line-height:1.7; }
  .buy-link{
    display:inline-block; font-size:12px; font-weight:700; color:var(--ink);
    background:var(--amber); padding:6px 14px; border-radius:999px; text-decoration:none;
    transition:background .12s ease, transform .12s ease;
  }
  .buy-link:hover{ background:#f0b357; transform:translateY(-1px); }

  .empty-note{
    background:var(--ink-soft); border:1px dashed rgba(255,255,255,0.15); border-radius:10px;
    padding:24px; text-align:center; color:var(--text-on-ink-muted); font-size:13px;
  }

  .retry-btn{
    margin-top:34px; display:inline-block; background:none; border:1px solid rgba(255,255,255,0.25);
    color:var(--text-on-ink); padding:13px 24px; border-radius:999px; font-size:14px; font-weight:700;
    cursor:pointer; font-family:'Zen Kaku Gothic New', sans-serif;
    transition:border-color .14s ease, color .14s ease, transform .14s ease;
  }
  .retry-btn:hover{ border-color:var(--amber); color:var(--amber); transform:translateY(-2px); }

  @media (max-width:520px){
    .choices, .choices.cols-3{ grid-template-columns:1fr; }
    .choices.tags-grid{ grid-template-columns:repeat(2, 1fr); }
    .card{ padding:26px 20px; }
  }
</style>
</head>

const routeColor = { teiki:"var(--lv1)", kyoutsuu:"var(--lv2)", niji:"var(--lv3)" };

let history = []; // 戻る用に step 名を積む

const quizArea = document.getElementById("quiz-area");
const crumbsEl = document.getElementById("crumbs");

function renderCrumbs(){
  const labels = [];
  if(answers.purpose) labels.push(["目的", routeName[answers.purpose]]);
  if(answers.teikiRange) labels.push(["範囲", answers.teikiRange]);
  if(answers.kyoRange) labels.push(["範囲", answers.kyoRange]);
  if(answers.status) labels.push(["状況", answers.statusLabel]);
  if(answers.nijiType) labels.push(["種類", answers.nijiType === "bunya" ? "分野別" : "総合"]);
  if(answers.bunya) labels.push(["分野", answers.bunya]);
  if(answers.bunyaProfile) {
    const conf = BUNYA_EXTRA[answers.bunya];
    const choice = conf && conf.choices.find(c => c.value === answers.bunyaProfile);
    if(choice) labels.push(["方針", choice.label]);
  }
  if(answers.sougouRange) labels.push(["範囲", answers.sougouRange]);
  if(answers.mouraikeiLabel) labels.push(["方針", answers.mouraikeiLabel]);
  if(answers.hensachi) labels.push(["偏差値", answers.hensachi]);
  if(answers.shibou) labels.push(["志望", answers.shibouLabel]);
  if(answers.shibouDetailLabel) labels.push(["大学", answers.shibouDetailLabel]);
  if(answers.style) labels.push(["参考書", answers.style === "quality" ? "解説・講義" : "問題集"]);
  crumbsEl.innerHTML = labels.map(([k,v], i) =>
    (i>0?'<span class="crumb-arrow">→</span>':'') + `<span class="crumb"><span class="k">${k}</span><b>${v}</b></span>`
  ).join("");
}

function go(step){ history.push(step); renderStep(step); }
function back(){
  history.pop(); // 現在のステップを捨てる
  const prev = history[history.length-1] || "start";
  // answers を巻き戻す（step に応じて該当キーを消す）
  rollback(prev);
  renderStep(prev, true);
}
function rollback(toStep){
  // 単純化のため、戻る時は現ステップで入れた値のみクリア
  const clearMap = {
    start:["purpose"],
    teiki_range:["teikiRange"], teiki_status:["status","statusLabel"], teiki_book:["style"],
    kyo_range:["kyoRange"], kyo_status:["status","statusLabel"], kyo_book:["style"],
    niji_type:["nijiType"], niji_bunya:["bunya"], niji_bunya_hensachi:["hensachi"],
    niji_bunya_shibou:["shibou","shibouLabel"], niji_bunya_book:["style"],
    niji_sougou_range:["sougouRange"], niji_sougou_status:["status","statusLabel"],
    niji_sougou_hensachi:["hensachi"], niji_sougou_shibou:["shibou","shibouLabel"], niji_sougou_book:["style"]
  };
  // toStep より後の値を消すのは複雑なので、履歴に無いキーを一括クリア
}

function renderQ(index, total, qText, choices, colClass){
  let html = `<div class="card">
    <div class="q-index">${index}${total?` / ${total}`:''}</div>
    <p class="q-text">${qText}</p>
    <div class="choices ${colClass||''}">`;
  choices.forEach(c=>{
    html += `<button class="choice-btn" data-value="${c.value}"${c.label2?` data-label="${c.label2}"`:''}>
      ${c.label}${c.sub?`<span class="sub">${c.sub}</span>`:''}
    </button>`;
  });
  html += `</div></div>`;
  if(history.length > 0){
    html += `<div class="nav-row"><a class="back-link" id="back-btn">← 前に戻る</a></div>`;
  }
  quizArea.innerHTML = html;
  renderCrumbs();
  const bb = document.getElementById("back-btn");
  if(bb) bb.addEventListener("click", back);
  return quizArea.querySelectorAll(".choice-btn");
}

function bindChoice(btns, handler){
  btns.forEach(b => b.addEventListener("click", ()=> handler(b.dataset.value, b.dataset.label)));
}

/* ============================================================
   結果算出
   ============================================================ */
function hensachiToTier(key){ return key==="lt50"?1 : key==="mid"?3 : 4; }
// 総合ルート専用：tier2（網羅系の標準帯）をきちんと拾えるように分野別とは別マッピングにする
function sougouHensachiToTier(key){ return key==="lt50"?1 : key==="mid"?2 : 4; }
function shibouToTier(key){
  if(key==="tokyoikko") return 4;
  if(key==="igaku") return 4;
  if(key==="kyutei") return 3;
  return 3; // その他
}
function statusToTier(status){
  // 定期・共通の初学系
  if(status==="none") return 1;
  if(status==="some") return 1;
  if(status==="much") return 2;
  return 2;
}
function rangeToScopes(){
  // 範囲文字列 → scope 許可リスト
  if(answers.purpose==="teiki"){
    const r = answers.teikiRange;
    if(["数III","複素数平面・式と曲線"].includes(r)) return ["common","rikei"];
    return ["common"];
  }
  if(answers.purpose==="kyoutsuu"){
    return answers.kyoRange==="数IIBC" ? ["common"] : ["common"];
  }
  if(answers.purpose==="niji"){
    if(answers.nijiType==="sougou"){
      return answers.sougouRangeKey==="III" ? ["common","rikei"] : ["common","bunkei"];
    }
    return ["common","rikei","bunkei"]; // 分野別は範囲不問
  }
  return ["common"];
}

function pickTier(){
  if(answers.purpose==="teiki") return statusToTier(answers.status);
  if(answers.purpose==="kyoutsuu") return answers.status==="none" ? 1 : 2;
  // 二次
  if(answers.nijiType==="bunya") {
    // 偏差値50未満は、志望校に関わらず無条件で基礎固め（tier1）から
    if(answers.hensachiKey === "lt50") return 1;
    // それ以外は偏差値と志望校の高い方を採用
    return Math.max(hensachiToTier(answers.hensachiKey), shibouToTier(answers.shibou));
  }
  // 総合
  if(answers.status==="hajime") return sougouHensachiToTier(answers.hensachiKey);
  // 範囲学習済み：偏差値50未満は志望校に関わらず無条件でtier1、それ以外は偏差値と志望校の高い方
  if(answers.hensachiKey === "lt50") return 1;
  return Math.max(sougouHensachiToTier(answers.hensachiKey), shibouToTier(answers.shibou));
}

function scoreBook(b, targetTier, scopes, purpose, style, bunya, bunyaHasMatch, krangeWanted, bunyaProfile, excludeBunyaSpecific, shibou, shibouDetail, mouraikeiChoice){
  if(!scopes.includes(b.scope)) return -Infinity;
  // 共通テストルート：範囲タグがある本は、選んだ範囲(IA/IIBC)と一致しないなら除外
  if(krangeWanted && b.krange && b.krange!=="both" && b.krange!==krangeWanted) return -Infinity;
  // 分野固有の追加質問（計算・ベクトルなど）：profileタグを持つ本は、選んだ方針と厳密一致しないと除外
  if(bunyaProfile && b.profile && b.profile !== bunyaProfile) return -Infinity;
  // 志望校限定タグ（粗め：東京一科/旧帝単位）：一致しない場合除外
  if(b.shibouOnly && !b.shibouOnly.includes(shibou)) return -Infinity;
  if(b.shibouExclude && b.shibouExclude.includes(shibou)) return -Infinity;
  // 志望校限定タグ（詳細：大学名単位）：一致しない場合除外
  if(b.shibouDetailOnly && !b.shibouDetailOnly.includes(shibouDetail)) return -Infinity;
  // 志望校ピンポイント一致：大学名指定の本は、同格の汎用書より優先する（ただしtierが完全一致する場合のみ。tierが離れた本にボーナスで下駄を履かせない）
  const shibouBonus = (b.tier === targetTier && ((b.shibouOnly && b.shibouOnly.includes(shibou)) || (b.shibouDetailOnly && b.shibouDetailOnly.includes(shibouDetail)))) ? 4 : 0;
  // 網羅系の希望：総合ルートで「網羅系を使いたい/使いたくない」を選んだ場合、厳密に一致する本だけ残す
  if(mouraikeiChoice==="yes" && !b.mouraikei) return -Infinity;
  if(mouraikeiChoice==="no" && b.mouraikei) return -Infinity;
  // 分野別診断：分野が指定されている場合、その分野の専用タグを持たない本は一切候補にしない
  // （総合書へのフォールバックは行わない。該当0冊なら「該当なし」を表示する）
  if(bunya && !b.bunya.includes(bunya)) return -Infinity;
  // 総合診断（分野別以外）：分野別専用タグを持つ本は逆に一切候補にしない
  // （「総合」を選んだのに特定分野の本が紛れ込むのを防ぐ）
  if(excludeBunyaSpecific && b.bunya && b.bunya.length > 0) return -Infinity;
  // 「無条件で最優先」フラグ：目標tierと一致する場合、質/量やprofileに関わらず最優先にする
  if(b.unconditional && b.tier === targetTier) return 1000;
  let s = 0;
  // tier近さ
  s += 5 - Math.abs(b.tier - targetTier)*2;
  // 目的一致
  if(b.purposes.includes(purpose)) s += 3;
  // スタイル
  if(style==="quality" && b.type==="quality") s += 2;
  if((style==="quantity"||style==="jissen") && b.type==="quantity") s += 2;
  return s + shibouBonus;
}

function renderResult(){
  const targetTier = pickTier();
  const scopes = rangeToScopes();
  const purposeForMatch = answers.purpose==="niji" ? "niji" : answers.purpose;
  const bunya = answers.bunya || null;
  const krangeWanted = answers.purpose==="kyoutsuu" ? (answers.kyoRange==="数IA" ? "IA" : "IIBC") : null;
  // 二次試験ルートで「総合」を選んだ場合は、分野別専用の本を除外する
  const excludeBunyaSpecific = (answers.purpose==="niji" && answers.nijiType==="sougou");

  let scored = BOOKS.map(b => ({b, s:scoreBook(b, targetTier, scopes, purposeForMatch, answers.style, bunya, null, krangeWanted, answers.bunyaProfile, excludeBunyaSpecific, answers.shibou, answers.shibouDetail, answers.mouraikeiChoice)}))
                    .filter(x => x.s > -Infinity)
                    .sort((a,b)=> b.s - a.s);
  let picks = scored.slice(0, 3).map(x=>x.b);

  const color = routeColor[answers.purpose];
  const rname = routeName[answers.purpose];

  document.getElementById("page-title").innerHTML = "診断結果";
  document.getElementById("page-lead").innerHTML = picks.length<=1 ? "あなたに一番合う参考書はこちらです。" : ("あなたに一番合う参考書、ベスト" + picks.length + "はこちら。");

  let summaryParts = [];
  if(answers.teikiRange) summaryParts.push(answers.teikiRange);
  if(answers.kyoRange) summaryParts.push(answers.kyoRange);
  if(answers.bunya) summaryParts.push(answers.bunya);
  if(answers.sougouRange) summaryParts.push(answers.sougouRange);
  if(answers.hensachi) summaryParts.push("偏差値"+answers.hensachi);
  if(answers.shibouLabel) summaryParts.push(answers.shibouLabel+"志望");

  const MEDAL = ["var(--amber)", "#C7CDD6", "#C98A4B"]; // 金・銀・銅
  const MEDAL_LABEL = ["No.1 イチオシ", "No.2", "No.3"];

  let bodyHtml;
  if(picks.length===0){
    bodyHtml = bunya
      ? `<div class="empty-note">「${bunya}」に特化した参考書は、まだデータベースにありません。他の分野を選ぶか、しばらくお待ちください。</div>`
      : '<div class="empty-note">条件に合う参考書が見つかりませんでした。選択を変えてもう一度お試しください。</div>';
  } else {
    let podiumHtml = '';
    if(picks.length >= 2){
      const podiumOrder = picks.length===3 ? [1,0,2] : [0,1];
      podiumHtml = '<div class="podium">';
      podiumOrder.forEach(idx=>{
        if(idx===undefined || !picks[idx]) return;
        const heightClass = idx===0 ? "podium-1" : (idx===1 ? "podium-2" : "podium-3");
        podiumHtml += `
          <div class="podium-col ${heightClass}">
            <div class="podium-book" style="background:${MEDAL[idx]}">
              <span class="podium-rank">${idx+1}</span>
            </div>
            <div class="podium-base" style="background:${MEDAL[idx]}"></div>
          </div>`;
      });
      podiumHtml += '</div>';
    }

    let listHtml = '<div class="book-list">';
    picks.forEach((b,i)=>{
      const scopeLabel = b.scope==="rikei"?"理系範囲":(b.scope==="bunkei"?"文系範囲":"");
      const chipLabel = picks.length===1 ? "イチオシ" : MEDAL_LABEL[i];
      listHtml += `<div class="book-item rank-${i+1}">
        <div class="book-chip" style="background:${MEDAL[i]}; color:var(--ink);">${chipLabel}</div>
        <div class="book-info">
          <p class="name">${b.name}${scopeLabel?`<span class="scope-tag">${scopeLabel}</span>`:''}</p>
          <p class="desc">${b.note||''}</p>
          <a class="buy-link" href="#" target="_blank" rel="noopener">Amazonで見る（準備中）</a>
        </div>
      </div>`;
    });
    listHtml += '</div>';

    bodyHtml = podiumHtml + listHtml;
  }

  quizArea.innerHTML = `
    <div class="result-head">
      <span class="route-badge" style="background:${color}">${rname}</span>
      <h2>${summaryParts.join(" ・ ")}</h2>
    </div>
    ${bodyHtml}
    <div style="text-align:center;">
      <button class="retry-btn" id="retry-btn">もう一度診断する</button>
    </div>
    <p class="disclaimer" style="margin-top:28px;">
      ※本診断は一般的な学習ルートの目安であり、個々の学力・志望校の出題傾向によって最適な参考書は異なります。<br>
      ※本ページはAmazonアソシエイト・プログラムの参加により紹介料を得ることがあります。
    </p>
  `;
  renderCrumbs();
  document.getElementById("retry-btn").addEventListener("click", ()=>{
    answers = {}; history = [];
    document.getElementById("page-title").innerHTML = "目的別・数学参考書診断";
    document.getElementById("page-lead").innerHTML = "「何の対策がしたいか」から始めて、あなたにぴったりの参考書を診断します。";
    renderStep("start");
  });
}

/* init */
renderStep("start");
